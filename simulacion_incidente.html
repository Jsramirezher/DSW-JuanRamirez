<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulación de Incidente de Seguridad</title>

<style>
* {
    box-sizing: border-box;
}

body {
    margin: 0;
    padding: 0;
    background-color: black;
    color: #00ff00;
    font-family: "Courier New", monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    text-align: center;
    overflow: hidden;
}

.contenedor {
    padding: 20px;
    max-width: 600px;
    width: 90%;
}

h1 {
    font-size: clamp(28px, 6vw, 48px);
    animation: parpadeo 1s infinite alternate;
    margin-bottom: 20px;
}

.mensaje {
    font-size: clamp(16px, 4vw, 22px);
    margin-bottom: 15px;
}

.submensaje {
    font-size: clamp(14px, 3.5vw, 16px);
    color: red;
    margin-bottom: 25px;
}

button {
    width: 100%;
    max-width: 300px;
    padding: 14px;
    font-size: 16px;
    font-weight: bold;
    background-color: #00ff00;
    border: none;
    cursor: pointer;
}

button:hover {
    background-color: white;
}

@keyframes parpadeo {
    from { opacity: 1; }
    to { opacity: 0.3; }
}

/* Canvas fondo */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="contenedor">
    <h1>SISTEMA COMPROMETIDO</h1>

    <p class="mensaje">
        Simulación controlada de incidente de seguridad informática.
    </p>

    <p class="submensaje">
        Ningún sistema real ha sido vulnerado. Ejercicio institucional.
    </p>

    <button onclick="restaurar()">Finalizar simulación</button>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function ajustarCanvas() {
    canvas.height = window.innerHeight;
    canvas.width = window.innerWidth;
}
ajustarCanvas();
window.addEventListener("resize", ajustarCanvas);

const letras = "01";
let fontSize = 16;
let columnas = canvas.width / fontSize;
let gotas = [];

function iniciarMatrix() {
    columnas = canvas.width / fontSize;
    gotas = [];
    for (let x = 0; x < columnas; x++) {
        gotas[x] = 1;
    }
}
iniciarMatrix();

function dibujar() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < gotas.length; i++) {
        const texto = letras.charAt(Math.floor(Math.random() * letras.length));
        ctx.fillText(texto, i * fontSize, gotas[i] * fontSize);

        if (gotas[i] * fontSize > canvas.height && Math.random() > 0.975) {
            gotas[i] = 0;
        }
        gotas[i]++;
    }
}

setInterval(dibujar, 33);

window.addEventListener("resize", () => {
    ajustarCanvas();
    iniciarMatrix();
});

/* Simulación de alertas */
setTimeout(() => {
    console.log("ALERTA: Acceso no autorizado detectado.");
}, 2000);

setTimeout(() => {
    console.log("ALERTA: Integridad del sistema comprometida.");
}, 4000);

/* Restauración */
function restaurar() {
    document.body.innerHTML = `
        <div style="display:flex;justify-content:center;align-items:center;height:100vh;text-align:center;font-family:Arial;padding:20px;">
            <div>
                <h1 style="color:green;">Sistema Restaurado</h1>
                <p>La simulación ha finalizado correctamente.</p>
                <p>Proceder con análisis post-incidente conforme a políticas del SGSI.</p>
            </div>
        </div>
    `;
}
</script>

</body>
</html>
</script>

</body>

</html>
