<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Simulación de Comprobante</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.tarjeta{

background:white;
width:360px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
padding:25px;
position:relative;

}

.simulacion{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
font-size:11px;
padding:4px 8px;
border-radius:4px;
}

.titulo{
text-align:center;
font-weight:bold;
margin-bottom:20px;
font-size:20px;
}

.monto{
font-size:32px;
text-align:center;
color:#00a650;
margin-bottom:20px;
}

.linea{
display:flex;
justify-content:space-between;
margin:8px 0;
font-size:14px;
}

.footer{
margin-top:20px;
font-size:12px;
text-align:center;
color:gray;
}

.alerta{
margin-top:15px;
background:#fff3cd;
padding:10px;
font-size:12px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="tarjeta">

<div class="simulacion">SIMULACIÓN</div>

<div class="titulo">
Comprobante de Transferencia
</div>

<div class="monto">
$150.000
</div>

<div class="linea">
<span>Estado:</span>
<span>Aprobada</span>
</div>

<div class="linea">
<span>Fecha:</span>
<span id="fecha"></span>
</div>

<div class="linea">
<span>Referencia:</span>
<span id="ref"></span>
</div>

<div class="linea">
<span>Origen:</span>
<span>Pedrito Plazas</span>
</div>

<div class="linea">
<span>Destino:</span>
<span>Oficina TIC</span>
</div>

<div class="alerta">
Este comprobante forma parte de un ejercicio de concienciación sobre fraude digital e ingeniería social.
</div>

<div class="footer">
Ejercicio de capacitación en seguridad informática
</div>

</div>

<script>

function generarReferencia(){

return "TX-"+Math.floor(Math.random()*999999999);

}

document.getElementById("ref").innerText = generarReferencia();

const fecha = new Date();
document.getElementById("fecha").innerText =
fecha.toLocaleDateString()+" "+fecha.toLocaleTimeString();

</script>

</body>
</html>
