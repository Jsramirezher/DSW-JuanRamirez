<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Simulación de Incidente de Seguridad</title>

<style>
body {
    margin: 0;
    padding: 0;
    background-color: black;
    color: #00ff00;
    font-family: "Courier New", monospace;
    overflow: hidden;
    text-align: center;
}

.contenedor {
    margin-top: 15%;
}

h1 {
    font-size: 48px;
    animation: parpadeo 1s infinite alternate;
}

.mensaje {
    font-size: 22px;
    margin-top: 20px;
}

.submensaje {
    font-size: 16px;
    color: red;
    margin-top: 10px;
}

button {
    margin-top: 30px;
    padding: 12px 25px;
    background-color: #00ff00;
    border: none;
    font-weight: bold;
    cursor: pointer;
}

button:hover {
    background-color: white;
}

@keyframes parpadeo {
    from { opacity: 1; }
    to { opacity: 0.3; }
}

/* Fondo tipo "Matrix" */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="contenedor">
    <h1>SISTEMA COMPROMETIDO</h1>

    <p class="mensaje">
        Esta es una simulación controlada de un incidente de seguridad informática.
    </p>

    <p class="submensaje">
        Ningún sistema real ha sido vulnerado. Ejercicio de concienciación institucional.
    </p>

    <button onclick="restaurar()">Finalizar simulación</button>
</div>

<script>
/* ===== EFECTO MATRIX ===== */
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

const letras = "01";
const fontSize = 16;
const columnas = canvas.width / fontSize;
const gotas = [];

for (let x = 0; x < columnas; x++) {
    gotas[x] = 1;
}

function dibujar() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < gotas.length; i++) {
        const texto = letras.charAt(Math.floor(Math.random() * letras.length));
        ctx.fillText(texto, i * fontSize, gotas[i] * fontSize);

        if (gotas[i] * fontSize > canvas.height && Math.random() > 0.975) {
            gotas[i] = 0;
        }
        gotas[i]++;
    }
}

setInterval(dibujar, 33);

/* ===== SIMULACIÓN DE ALERTAS ===== */
setTimeout(() => {
    console.log("ALERTA: Acceso no autorizado detectado.");
}, 2000);

setTimeout(() => {
    console.log("ALERTA: Integridad del sistema comprometida.");
}, 4000);

/* ===== RESTAURACIÓN ===== */
function restaurar() {
    document.body.innerHTML = `
        <div style="margin-top:20%; font-family:Arial; text-align:center;">
            <h1 style="color:green;">Sistema Restaurado</h1>
            <p>La simulación ha finalizado correctamente.</p>
            <p>Se recomienda iniciar análisis post-incidente conforme a políticas institucionales.</p>
        </div>
    `;
}
</script>

</body>
</html>
